<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    /* ========== 基础样式 ========== */
    body { 
      width: 420px;           /* 弹窗宽度 */
      min-height: 550px;      /* 最小高度 */
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    /* ========== 头部样式 ========== */
    .header {
      background: linear-gradient(135deg, #4CAF50, #2E7D32);  /* 绿色渐变背景 */
      padding: 16px;
      color: white;
    }
    .header h1 {
      margin: 0;
      font-size: 18px;
    }
    .header p {
      margin: 4px 0 0;
      font-size: 12px;
      opacity: 0.8;
    }
    
    /* ========== 内容区域 ========== */
    .content {
      padding: 16px;
      background: #f5f5f5;
    }
    
    /* ========== 按钮样式 ========== */
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    /* 绿色按钮 - 主要操作 */
    .btn-green {
      background: #4CAF50;
      color: white;
    }
    .btn-green:hover {
      background: #43A047;
    }
    /* 蓝色按钮 - 次要操作 */
    .btn-blue {
      background: #2196F3;
      color: white;
    }
    .btn-blue:hover {
      background: #1976D2;
    }
    /* 紫色按钮 - 导出操作 */
    .btn-purple {
      background: #7B1FA2;
      color: white;
    }
    .btn-purple:hover {
      background: #6A1B9A;
    }
    /* 橙色按钮 - OCR操作 */
    .btn-orange {
      background: #FF9800;
      color: white;
    }
    .btn-orange:hover {
      background: #F57C00;
    }
    /* 禁用状态 */
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    /* ========== 截图预览 ========== */
    .preview {
      margin-top: 16px;
      display: none;          /* 默认隐藏 */
    }
    .preview img {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #ddd;
    }
    .preview-label {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
    }
    
    /* ========== 加载状态 ========== */
    .loading {
      margin-top: 16px;
      display: none;          /* 默认隐藏 */
      text-align: center;
    }
    /* 旋转动画 */
    .loading .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #2196F3;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 8px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading-text {
      font-size: 13px;
      color: #666;
    }
    
    /* ========== 结果展示 ========== */
    .result {
      margin-top: 16px;
      display: none;          /* 默认隐藏 */
    }
    .result textarea {
      width: 100%;
      height: 150px;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      resize: none;           /* 禁止调整大小 */
      box-sizing: border-box;
    }
    .result-label {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
    }
    
    /* ========== 错误提示 ========== */
    .error {
      margin-top: 16px;
      padding: 12px;
      background: #ffebee;    /* 浅红色背景 */
      border: 1px solid #ef5350;
      border-radius: 8px;
      display: none;          /* 默认隐藏 */
    }
    .error-text {
      font-size: 13px;
      color: #c62828;         /* 深红色文字 */
    }
    
    /* ========== 配置区域 ========== */
    .config {
      margin-top: 16px;
    }
    .config-label {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
    }
    .config-row {
      margin-bottom: 12px;
    }
    .config-row label {
      font-size: 13px;
      display: block;
      margin-bottom: 4px;
    }
    .config-row select,
    .config-row input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      box-sizing: border-box;
    }
    .config-row .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .config-row .checkbox-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
    }
    .config-section-title {
      font-size: 14px;
      font-weight: 500;
      color: #333;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid #ddd;
    }
    
    /* ========== 工具类 ========== */
    .mt-4 {
      margin-top: 16px;
    }
    .flex {
      display: flex;
      gap: 8px;
    }
    .flex button {
      flex: 1;
    }
  </style>
</head>
<body>
  <!-- 头部标题 -->
  <div class="header">
    <h1>📸 截图转文档 v4.0</h1>
    <p>选择区域 → 提取文字 → 导出文档</p>
    <div style="font-size: 11px; margin-top: 8px; opacity: 0.9;">
      <div><strong>⌨️ 快捷键：</strong></div>
      <div><kbd style="background:#333;padding:2px 6px;border-radius:3px;">Alt</kbd>+<kbd style="background:#333;padding:2px 6px;border-radius:3px;">S</kbd> 直接框选截图</div>
      <div><kbd style="background:#333;padding:2px 6px;border-radius:3px;">Alt</kbd>+<kbd style="background:#333;padding:2px 6px;border-radius:3px;">P</kbd> 打开/关闭弹窗</div>
    </div>
  </div>

  <!-- 主内容区域 -->
  <div class="content">
    <!-- 步骤1: 选择截图区域 -->
    <button id="selectAreaBtn" class="btn btn-green">
      🎯 选择截图区域
    </button>

    <!-- 截图预览区域 -->
    <div id="screenshotPreview" class="preview">
      <div class="preview-label">截图预览</div>
      <img id="screenshotImg" alt="截图预览">
    </div>

    <!-- 配置区域 -->
    <div id="config">
      <!-- 导出配置 -->
      <div class="config-section-title">导出配置</div>
      <div class="config-row">
        <label>导出格式</label>
        <select id="exportFormat">
          <option value="txt">📝 TXT 纯文本</option>
          <option value="md">📑 Markdown</option>
          <option value="html">🌐 HTML</option>
          <option value="doc">📘 Word (.doc)</option>
          <option value="pdf">📕 PDF</option>
        </select>
      </div>
      <div class="config-row">
        <label>导出内容</label>
        <div class="checkbox-group">
          <label class="checkbox-item">
            <input type="checkbox" id="exportText" checked> 文字
          </label>
          <label class="checkbox-item">
            <input type="checkbox" id="exportImage" checked> 图片
          </label>
        </div>
      </div>

      <!-- OCR 配置 -->
      <div class="config-section-title">OCR 配置（可选）</div>
      <div class="config-row">
        <label>选择 OCR 方式</label>
        <select id="ocrProvider">
          <option value="local">本地 OCR（免费，无需API Key）</option>
          <option value="baidu">百度 OCR（云端，更准确）</option>
          <option value="tencent">腾讯云 OCR（云端）</option>
          <option value="aliyun">阿里云 OCR（云端）</option>
        </select>
      </div>
      <div id="baiduConfig" style="display: none;">
        <div class="config-row">
          <label>API Key</label>
          <input type="password" id="baiduApiKey" placeholder="输入百度OCR API Key">
          <p style="font-size: 11px; color: #999; margin-top: 4px;">
            <a href="https://ai.baidu.com/tech/ocr" target="_blank" style="color: #2196F3;">
              获取API Key →
            </a>
          </p>
        </div>
        <div class="config-row">
          <label>Secret Key</label>
          <input type="password" id="baiduSecretKey" placeholder="输入百度OCR Secret Key">
        </div>
      </div>
      <div id="tencentConfig" style="display: none;">
        <div class="config-row">
          <label>Secret Id</label>
          <input type="text" id="tencentSecretId" placeholder="输入腾讯云 Secret Id">
          <p style="font-size: 11px; color: #999; margin-top: 4px;">
            <a href="https://console.cloud.tencent.com/cam/capi" target="_blank" style="color: #2196F3;">
              获取Secret →
            </a>
          </p>
        </div>
        <div class="config-row">
          <label>Secret Key</label>
          <input type="password" id="tencentSecretKey" placeholder="输入腾讯云 Secret Key">
        </div>
      </div>
      <div id="aliyunConfig" style="display: none;">
        <div class="config-row">
          <label>AccessKey ID</label>
          <input type="text" id="aliyunAccessKeyId" placeholder="输入阿里云 AccessKey ID">
          <p style="font-size: 11px; color: #999; margin-top: 4px;">
            <a href="https://ram.console.aliyun.com/manage/ak" target="_blank" style="color: #2196F3;">
              获取AccessKey →
            </a>
          </p>
        </div>
        <div class="config-row">
          <label>AccessKey Secret</label>
          <input type="password" id="aliyunAccessKeySecret" placeholder="输入阿里云 AccessKey Secret">
        </div>
      </div>
    </div>

    <!-- 步骤2: 提取文字按钮组 -->
    <div class="flex mt-4" id="extractButtons" style="display: none;">
      <button id="extractBtn" class="btn btn-blue">
        📝 提取文字
      </button>
      <button id="ocrBtn" class="btn btn-orange">
        🔍 OCR识别
      </button>
    </div>

    <!-- 加载状态 -->
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <div class="loading-text" id="loadingText">处理中...</div>
    </div>

    <!-- 提取结果展示 -->
    <div id="result" class="result">
      <div class="result-label">提取结果</div>
      <textarea id="resultText" placeholder="提取的文字将显示在这里..."></textarea>
    </div>

    <!-- 步骤3: 导出文档 -->
    <button id="exportBtn" class="btn btn-purple mt-4" style="display: none;">
      📄 导出文档
    </button>

    <!-- 错误提示 -->
    <div id="error" class="error">
      <div class="error-text" id="errorText"></div>
    </div>
  </div>

  <!-- 引入弹窗脚本 -->
  <script src="popup.js"></script>
</body>
</html>
